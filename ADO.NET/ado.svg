<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%" style="background-color: #fdfdfd; font-family: 'Comic Sans MS', 'Segoe Print', 'Chalkboard SE', 'Bradley Hand', cursive, sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e1e1e" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669" />
    </marker>
  </defs>

  <text x="500" y="50" font-size="28" font-weight="bold" fill="#1e1e1e" text-anchor="middle">ADO.NET: The Minimal Flow</text>

  <rect x="55" y="155" width="140" height="70" rx="8" fill="#d1d5db" />
  <rect x="50" y="150" width="140" height="70" rx="8" fill="#e0f7fa" stroke="#1e1e1e" stroke-width="2.5" />
  <text x="120" y="192" font-size="20" font-weight="bold" fill="#1e1e1e" text-anchor="middle">Your App</text>
  <text x="120" y="245" font-size="14" fill="#555" text-anchor="middle">(Memory)</text>

  <rect x="305" y="155" width="140" height="70" rx="8" fill="#d1d5db" />
  <rect x="300" y="150" width="140" height="70" rx="8" fill="#fff" stroke="#2563eb" stroke-width="2.5" />
  <text x="370" y="192" font-size="20" font-weight="bold" fill="#2563eb" text-anchor="middle">Connection</text>

  <rect x="555" y="155" width="140" height="70" rx="8" fill="#d1d5db" />
  <rect x="550" y="150" width="140" height="70" rx="8" fill="#fff" stroke="#be185d" stroke-width="2.5" />
  <text x="620" y="192" font-size="20" font-weight="bold" fill="#be185d" text-anchor="middle">Command</text>

  <path d="M 835 155 Q 885 155 935 155 L 935 215 Q 885 245 835 215 Z" fill="#d1d5db" />
  <path d="M 830 150 Q 880 130 930 150 L 930 210 Q 880 240 830 210 Z" fill="#e8f5e9" stroke="#1e1e1e" stroke-width="2.5" />
  <path d="M 830 150 Q 880 170 930 150" fill="none" stroke="#1e1e1e" stroke-width="2.5" />
  <text x="880" y="200" font-size="20" font-weight="bold" fill="#1e1e1e" text-anchor="middle">Database</text>

  <rect x="435" y="325" width="180" height="60" rx="8" fill="#d1d5db" />
  <rect x="430" y="320" width="180" height="60" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="3" stroke-dasharray="6 4" />
  <text x="520" y="356" font-size="20" font-weight="bold" fill="#059669" text-anchor="middle">Data Reader</text>

  <path d="M 190 185 L 290 185" fill="none" stroke="#1e1e1e" stroke-width="3" marker-end="url(#arrow)" />
  <text x="240" y="175" font-size="14" font-weight="bold" fill="#1e1e1e" text-anchor="middle">1. Open Pipe</text>

  <path d="M 440 185 L 540 185" fill="none" stroke="#1e1e1e" stroke-width="3" marker-end="url(#arrow)" />
  <text x="490" y="175" font-size="14" font-weight="bold" fill="#1e1e1e" text-anchor="middle">2. Add SQL</text>

  <path d="M 690 185 L 820 185" fill="none" stroke="#1e1e1e" stroke-width="3" marker-end="url(#arrow)" />
  <text x="755" y="175" font-size="14" font-weight="bold" fill="#1e1e1e" text-anchor="middle">3. Execute</text>

  <path d="M 880 230 Q 880 350 620 350" fill="none" stroke="#059669" stroke-width="3" stroke-dasharray="8 4" marker-end="url(#arrow-green)" />
  <text x="750" y="370" font-size="14" font-weight="bold" fill="#059669" text-anchor="middle">4. High-Speed Stream</text>

  <path d="M 430 350 Q 120 350 120 230" fill="none" stroke="#059669" stroke-width="3" stroke-dasharray="8 4" marker-end="url(#arrow-green)" />
  <text x="280" y="370" font-size="14" font-weight="bold" fill="#059669" text-anchor="middle">5. Fetch Row-by-Row</text>

</svg>
