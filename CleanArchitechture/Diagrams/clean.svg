<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" width="100%" height="100%">
  <defs>
    <filter id="sketch-filter" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    
    <filter id="rough-filter" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.07" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G" />
    </filter>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,400;0,700;1,400&amp;display=swap');
      
      .excl-title { font-family: 'Comic Neue', 'Segoe UI', cursive; font-size: 26px; font-weight: bold; fill: #1A202C; }
      .excl-subtitle { font-family: 'Comic Neue', 'Segoe UI', cursive; font-size: 14px; fill: #4A5568; font-style: italic; }
      .excl-header { font-family: 'Comic Neue', 'Segoe UI', cursive; font-size: 18px; font-weight: bold; fill: #2D3748; }
      .excl-label { font-family: 'Comic Neue', 'Segoe UI', cursive; font-size: 14px; font-weight: bold; fill: #1A202C; }
      .excl-text { font-family: 'Comic Neue', 'Segoe UI', cursive; font-size: 13px; font-weight: bold; fill: #2D3748; }
      .excl-muted { font-family: 'Comic Neue', 'Segoe UI', cursive; font-size: 12px; fill: #718096; }
      .excl-arrow-text { font-family: 'Comic Neue', 'Segoe UI', cursive; font-size: 11px; font-weight: bold; fill: #E53E3E; }
      
      .sketch-shape { stroke-linecap: round; stroke-linejoin: round; filter: url(#sketch-filter); }
      .rough-shape { stroke-linecap: round; stroke-linejoin: round; filter: url(#rough-filter); }
      
      .hand-arrow { stroke: #E53E3E; stroke-width: 2; fill: none; stroke-linecap: round; filter: url(#sketch-filter); }
      .hand-map { stroke: #4A5568; stroke-width: 1.5; stroke-dasharray: 4 5; fill: none; stroke-linecap: round; filter: url(#sketch-filter); }
    </style>

    <marker id="sketch-arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 1 2 L 8 5 L 2 8 L 4 5 Z" fill="#E53E3E" filter="url(#sketch-filter)" />
    </marker>
    
    <marker id="sketch-dot" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5">
      <circle cx="5" cy="5" r="2.5" fill="#4A5568" filter="url(#sketch-filter)" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#FFFDF9" />

  <g transform="translate(50, 45)">
    <text class="excl-title" x="0" y="0">Clean Architecture vs. Your Practical Implementation</text>
    <text class="excl-subtitle" x="0" y="24">Mapping the conceptual circles to modern project/folder blueprints</text>
  </g>

  <g transform="translate(50, 105)">
    <text class="excl-header" x="10" y="20">Uncle Bob's Conceptual Diagram</text>
    
    <g transform="translate(180, 260)">
      <circle r="150" fill="#EBF8FF" stroke="#1A365D" stroke-width="2" class="sketch-shape" opacity="0.9"/>
      <circle r="149" fill="none" stroke="#2B6CB0" stroke-width="1.5" class="rough-shape" />
      <text class="excl-label" x="0" y="-125" text-anchor="middle">Frameworks &amp; Drivers</text>
      <text class="excl-muted" x="105" y="85" text-anchor="middle">Web / UI</text>
      <text class="excl-muted" x="-110" y="85" text-anchor="middle">DB / Devices</text>

      <circle r="110" fill="#F0FFF4" stroke="#1C3D27" stroke-width="2" class="sketch-shape" opacity="0.9"/>
      <circle r="111" fill="none" stroke="#38A169" stroke-width="1.5" class="rough-shape" />
      <text class="excl-label" x="0" y="-85" text-anchor="middle">Interface Adapters</text>
      <text class="excl-muted" x="65" y="55" text-anchor="middle">Presenters</text>
      <text class="excl-muted" x="-65" y="55" text-anchor="middle">Controllers</text>

      <circle r="72" fill="#FFF5F5" stroke="#63171D" stroke-width="2" class="sketch-shape" opacity="0.9"/>
      <circle r="71" fill="none" stroke="#E53E3E" stroke-width="1.5" class="rough-shape" />
      <text class="excl-label" x="0" y="-45" text-anchor="middle">Use Cases</text>

      <circle r="36" fill="#FEFCBF" stroke="#744210" stroke-width="2" class="sketch-shape" opacity="0.9"/>
      <circle r="35" fill="none" stroke="#D69E2E" stroke-width="1.5" class="rough-shape" />
      <text class="excl-label" x="0" y="5" text-anchor="middle">Entities</text>
      
      <path d="M 0 142 L 0 118" marker-end="url(#sketch-arrow-red)" stroke="#E53E3E" stroke-width="2" fill="none" class="sketch-shape" />
      <path d="M 0 102 L 0 78" marker-end="url(#sketch-arrow-red)" stroke="#E53E3E" stroke-width="2" fill="none" class="sketch-shape" />
      <path d="M 0 62 L 0 42" marker-end="url(#sketch-arrow-red)" stroke="#E53E3E" stroke-width="2" fill="none" class="sketch-shape" />
    </g>
  </g>

  <g transform="translate(540, 105)">
    <text class="excl-header" x="20" y="20">Your Actual Project Structure</text>

    <g transform="translate(20, 50)">
      <rect width="330" height="65" fill="#EDF2F7" stroke="#2D3748" stroke-width="2" rx="6" class="sketch-shape" />
      <rect width="328" height="63" fill="none" stroke="#4A5568" stroke-width="1" rx="6" class="rough-shape" />
      <text class="excl-label" x="15" y="24" fill="#2B6CB0">📁 MyProject.Host (Presentation)</text>
      <text class="excl-text" x="35" y="45" fill="#4A5568">- Program.cs, Controllers, Minimal APIs</text>
    </g>

    <g transform="translate(20, 140)">
      <rect width="330" height="65" fill="#EDF2F7" stroke="#2D3748" stroke-width="2" rx="6" class="sketch-shape" />
      <rect width="328" height="63" fill="none" stroke="#4A5568" stroke-width="1" rx="6" class="rough-shape" />
      <text class="excl-label" x="15" y="24" fill="#2C5282">📁 MyProject.Infrastructure</text>
      <text class="excl-text" x="35" y="45" fill="#4A5568">- DbContext, EF Configurations, Repos, APIs</text>
    </g>

    <g transform="translate(20, 240)">
      <rect width="330" height="65" fill="#EDF2F7" stroke="#2D3748" stroke-width="2" rx="6" class="sketch-shape" />
      <rect width="328" height="63" fill="none" stroke="#4A5568" stroke-width="1" rx="6" class="rough-shape" />
      <text class="excl-label" x="15" y="24" fill="#9B2C2C">📁 MyProject.Application</text>
      <text class="excl-text" x="35" y="45" fill="#4A5568">- Use Cases, Commands, Queries, Interfaces</text>
    </g>

    <g transform="translate(20, 340)">
      <rect width="330" height="65" fill="#EDF2F7" stroke="#2D3748" stroke-width="2" rx="6" class="sketch-shape" />
      <rect width="328" height="63" fill="none" stroke="#4A5568" stroke-width="1" rx="6" class="rough-shape" />
      <text class="excl-label" x="15" y="24" fill="#9C4221">📁 MyProject.Domain</text>
      <text class="excl-text" x="35" y="45" fill="#4A5568">- Core Entities, Value Objects, Aggregates</text>
    </g>

    <path d="M 320 122 C 335 150, 335 200, 320 232" marker-end="url(#sketch-arrow-red)" class="hand-arrow" />
    <path d="M 300 212 C 310 220, 310 230, 300 235" marker-end="url(#sketch-arrow-red)" class="hand-arrow" />
    <path d="M 185 312 L 185 332" marker-end="url(#sketch-arrow-red)" class="hand-arrow" />
    
    <text class="excl-arrow-text" x="340" y="175">Depends On</text>
  </g>

  <path d="M 220 365 C 280 365, 450 420, 550 395" class="hand-map" marker-start="url(#sketch-dot)" marker-end="url(#sketch-dot)" />
  
  <path d="M 245 340 C 320 340, 430 310, 550 285" class="hand-map" marker-start="url(#sketch-dot)" marker-end="url(#sketch-dot)" />
  
  <path d="M 290 230 C 350 210, 420 120, 550 100" class="hand-map" marker-start="url(#sketch-dot)" marker-end="url(#sketch-dot)" />
  <path d="M 320 280 C 390 260, 450 210, 550 185" class="hand-map" marker-start="url(#sketch-dot)" marker-end="url(#sketch-dot)" />

  <g transform="translate(390, 240)">
    <ellipse cx="45" cy="20" rx="38" ry="18" fill="#FFFDF9" stroke="#4A5568" stroke-width="1.5" class="sketch-shape" />
    <ellipse cx="46" cy="21" rx="37" ry="17" fill="none" stroke="#718096" stroke-width="1" class="rough-shape" />
    <text class="excl-text" x="45" y="24" text-anchor="middle" font-weight="bold">MAPPED</text>
  </g>
</svg>
