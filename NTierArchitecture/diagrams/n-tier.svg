<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 550" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&amp;display=swap');
      text { font-family: 'Caveat', cursive; fill: #2d3436; font-size: 20px; }
      .title { font-size: 26px; font-weight: bold; }
      .desc { font-size: 16px; fill: #636e72; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d3436" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#fdf6e3" rx="15" />
  <text x="300" y="40" class="title" text-anchor="middle">N-Tier (Layered) Architecture</text>

  <rect x="150" y="80" width="300" height="80" fill="#ffeaa7" stroke="#2d3436" stroke-width="2" rx="10" transform="rotate(-1 300 120)" />
  <text x="300" y="115" class="title" text-anchor="middle">1. Presentation Layer</text>
  <text x="300" y="140" class="desc" text-anchor="middle">(Controllers, Views, React, APIs)</text>

  <path d="M 300 160 L 300 210" fill="none" stroke="#2d3436" stroke-width="3" marker-end="url(#arrow)" />

  <rect x="150" y="220" width="300" height="80" fill="#81ecec" stroke="#2d3436" stroke-width="2" rx="10" transform="rotate(1 300 260)" />
  <text x="300" y="255" class="title" text-anchor="middle">2. Business Logic Layer</text>
  <text x="300" y="280" class="desc" text-anchor="middle">(Services, Rules, Calculations)</text>

  <path d="M 300 300 L 300 350" fill="none" stroke="#2d3436" stroke-width="3" marker-end="url(#arrow)" />

  <rect x="150" y="360" width="300" height="80" fill="#55efc4" stroke="#2d3436" stroke-width="2" rx="10" transform="rotate(-1 300 400)" />
  <text x="300" y="395" class="title" text-anchor="middle">3. Data Access Layer</text>
  <text x="300" y="420" class="desc" text-anchor="middle">(Entity Framework, SQL Queries)</text>

  <path d="M 300 440 L 300 480" fill="none" stroke="#2d3436" stroke-width="3" marker-end="url(#arrow)" />

  <path d="M 230 490 C 230 480, 370 480, 370 490 L 370 520 C 370 530, 230 530, 230 520 Z" fill="#dfe6e9" stroke="#2d3436" stroke-width="2" />
  <text x="300" y="515" class="title" text-anchor="middle">Database</text>
</svg>
