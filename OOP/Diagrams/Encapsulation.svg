<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&amp;family=Comic+Neue:wght@400;700&amp;display=swap');
      
      .sketch-text { 
        font-family: 'Comic Neue', 'Caveat', 'Comic Sans MS', cursive; 
        fill: #1e1e1e;
      }
      .sketch-title {
        font-family: 'Comic Neue', 'Caveat', 'Comic Sans MS', cursive; 
        font-weight: 700;
      }
    </style>

    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 1 1 L 9 5 L 1 9 z" fill="#2b8a3e" stroke="#2b8a3e" stroke-linejoin="round" />
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 1 1 L 9 5 L 1 9 z" fill="#e03131" stroke="#e03131" stroke-linejoin="round" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 1 1 L 9 5 L 1 9 z" fill="#1971c2" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#fdfdfd" />

  <rect x="254" y="54" width="680" height="510" rx="20" fill="none" stroke="#e9ecef" stroke-width="4" />
  <rect x="250" y="50" width="680" height="510" rx="20" fill="#ffffff" stroke="#1e1e1e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  
  <text x="590" y="95" text-anchor="middle" font-size="28" class="sketch-title">The Class (Encapsulation Bubble)</text>

  <rect x="300" y="130" width="580" height="150" rx="12" fill="#fff5f5" stroke="#e03131" stroke-width="2" stroke-dasharray="12, 8" stroke-linecap="round" />
  
  <text x="330" y="170" font-size="24" fill="#e03131" class="sketch-title">🔒 Private Attributes (Data / State)</text>
  
  <text x="350" y="210" font-size="22" class="sketch-text">➖ _balance: double</text>
  <text x="350" y="245" font-size="22" class="sketch-text">➖ _username: string</text>

  <rect x="300" y="320" width="580" height="210" rx="12" fill="#f4fce3" stroke="#2b8a3e" stroke-width="3" stroke-linecap="round" />
  
  <text x="330" y="365" font-size="24" fill="#2b8a3e" class="sketch-title">⚙️ Public Methods (Behaviors / Interface)</text>
  
  <text x="350" y="415" font-size="22" class="sketch-text">➕ deposit(amount)</text>
  <text x="350" y="450" font-size="22" class="sketch-text">➕ withdraw(amount)</text>
  <text x="350" y="485" font-size="22" class="sketch-text">➕ getBalance()</text>

  <path d="M 780 320 C 830 280, 830 200, 780 160" fill="none" stroke="#1971c2" stroke-width="3" stroke-dasharray="6, 6" marker-end="url(#arrow-blue)" />
  <text x="800" y="250" font-size="16" fill="#1971c2" class="sketch-title" text-anchor="middle" transform="rotate(-90 800 250)">Mutates safely</text>


  <circle cx="100" cy="270" r="18" fill="none" stroke="#1e1e1e" stroke-width="3" />
  <path d="M 100 288 L 100 340 M 100 300 L 60 330 M 100 300 L 140 330 M 100 340 L 70 390 M 100 340 L 130 390" stroke="#1e1e1e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  <text x="100" y="425" text-anchor="middle" font-size="22" class="sketch-title">Client Code</text>

  <path d="M 140 250 C 180 200, 240 200, 280 200" fill="none" stroke="#e03131" stroke-width="3" stroke-dasharray="8, 8" marker-end="url(#arrow-red)" />
  
  <path d="M 245 175 L 285 225 M 285 175 L 245 225" stroke="#e03131" stroke-width="6" stroke-linecap="round" />
  <text x="175" y="180" font-size="18" fill="#e03131" class="sketch-title" text-anchor="middle">Direct Access Attempt</text>
  <text x="175" y="200" font-size="16" fill="#e03131" class="sketch-title" text-anchor="middle">DENIED!</text>

  <path d="M 140 330 C 180 390, 230 380, 285 410" fill="none" stroke="#2b8a3e" stroke-width="4" marker-end="url(#arrow-green)" stroke-linecap="round" />
  
  <text x="190" y="375" font-size="18" fill="#2b8a3e" class="sketch-title" text-anchor="middle">Allowed Access</text>
  <text x="190" y="395" font-size="16" fill="#2b8a3e" class="sketch-title" text-anchor="middle">(via Public API)</text>

</svg>
