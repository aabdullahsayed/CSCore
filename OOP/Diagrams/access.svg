<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&amp;family=Comic+Neue:wght@400;700&amp;display=swap');
      
      .sketch-title { 
        font-family: 'Comic Neue', 'Caveat', cursive; 
        font-weight: 700; 
        fill: #1e1e1e; 
      }
      .sketch-text { 
        font-family: 'Comic Neue', 'Caveat', cursive; 
        font-weight: 400;
        fill: #333333; 
      }
      .sketch-code {
        font-family: 'Comic Neue', cursive;
        font-weight: 700;
      }
      .hl-pink { fill: #c2255c; font-weight: 700; }
      .hl-green { fill: #2b8a3e; font-weight: 700; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#fdfdfd" />

  <rect x="344" y="34" width="310" height="60" rx="10" fill="none" stroke="#e9ecef" stroke-width="4" transform="rotate(-1, 500, 60)" />
  <rect x="340" y="30" width="310" height="60" rx="10" fill="#6741d9" stroke="#1e1e1e" stroke-width="3" transform="rotate(-1, 500, 60)" />
  <text x="495" y="70" text-anchor="middle" font-size="32" fill="#ffffff" class="sketch-title" transform="rotate(-1, 500, 60)">ENCAPSULATION</text>

  <text x="500" y="140" text-anchor="middle" font-size="24" class="sketch-title">Access modifiers control visibility of fields and methods:</text>

  <rect x="106" y="176" width="800" height="430" rx="20" fill="none" stroke="#e9ecef" stroke-width="4" />
  <rect x="100" y="170" width="800" height="430" rx="20" fill="#ffffff" stroke="#1e1e1e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  
  <circle cx="140" cy="205" r="8" fill="none" stroke="#1e1e1e" stroke-width="2" />
  <circle cx="170" cy="205" r="8" fill="none" stroke="#1e1e1e" stroke-width="2" />
  <circle cx="200" cy="205" r="8" fill="none" stroke="#1e1e1e" stroke-width="2" />

  <text x="140" y="260" font-size="24" fill="#868e96" class="sketch-title">| Modifier</text>
  <text x="400" y="260" font-size="24" fill="#868e96" class="sketch-title">| Access Level</text>
  
  <path d="M 140 280 L 860 280" fill="none" stroke="#868e96" stroke-width="2" stroke-dasharray="8, 6" stroke-linecap="round" />

  <text x="140" y="325" font-size="22" class="sketch-title">|</text>
  <text x="160" y="325" font-size="24" fill="#2b8a3e" class="sketch-code">public</text>
  <text x="400" y="325" font-size="22" class="sketch-title">|</text>
  <text x="420" y="325" font-size="22" class="sketch-text">Accessible everywhere</text>
  <text x="860" y="325" font-size="22" class="sketch-title">|</text>

  <text x="140" y="380" font-size="22" class="sketch-title">|</text>
  <text x="160" y="380" font-size="24" fill="#c2255c" class="sketch-code">private</text>
  <text x="400" y="380" font-size="22" class="sketch-title">|</text>
  <text x="420" y="380" font-size="22" class="sketch-text">Accessible only within the class</text>
  <text x="860" y="380" font-size="22" class="sketch-title">|</text>

  <text x="140" y="435" font-size="22" class="sketch-title">|</text>
  <text x="160" y="435" font-size="24" fill="#d9480f" class="sketch-code">protected</text>
  <text x="400" y="435" font-size="22" class="sketch-title">|</text>
  <text x="420" y="435" font-size="22" class="sketch-text">Accessible within the <tspan class="hl-pink">class</tspan> <tspan class="hl-green">and</tspan> derived classes</text>
  <text x="860" y="435" font-size="22" class="sketch-title">|</text>

  <text x="140" y="490" font-size="22" class="sketch-title">|</text>
  <text x="160" y="490" font-size="24" fill="#0b7285" class="sketch-code">internal</text>
  <text x="400" y="490" font-size="22" class="sketch-title">|</text>
  <text x="420" y="490" font-size="22" class="sketch-text">Accessible within the same assembly</text>
  <text x="860" y="490" font-size="22" class="sketch-title">|</text>

  <text x="140" y="545" font-size="22" class="sketch-title">|</text>
  <text x="160" y="545" font-size="24" fill="#6741d9" class="sketch-code">protected internal</text>
  <text x="400" y="545" font-size="22" class="sketch-title">|</text>
  <text x="420" y="545" font-size="22" class="sketch-text">Accessible <tspan class="hl-pink">in</tspan> derived classes or same assembly</text>
  <text x="860" y="545" font-size="22" class="sketch-title">|</text>

  <path d="M 880 200 C 900 220, 870 240, 890 260" fill="none" stroke="#e9ecef" stroke-width="3" stroke-linecap="round" />
  <path d="M 80 500 C 60 520, 90 540, 70 560" fill="none" stroke="#e9ecef" stroke-width="3" stroke-linecap="round" />

</svg>
