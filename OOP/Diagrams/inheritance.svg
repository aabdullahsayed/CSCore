<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&amp;family=Comic+Neue:wght@400;700&amp;display=swap');
      
      .box-text { 
        font-family: 'Comic Neue', 'Comic Sans MS', cursive; 
        font-size: 20px;
        fill: #334155;
      }
      .label-text {
        font-family: 'Comic Neue', 'Comic Sans MS', cursive; 
        font-size: 24px;
        font-weight: 700;
        fill: #0f172a;
      }
      
      /* Colors matching the reference */
      .bg-yellow { fill: #fef08a; stroke: #cbd5e1; stroke-width: 2; }
      .bg-green { fill: #bbf7d0; stroke: #cbd5e1; stroke-width: 2; }
      .bg-blue { fill: #bfdbfe; stroke: #cbd5e1; stroke-width: 2; }
      
      /* Hand-drawn offset shadows for vibe */
      .shadow { fill: none; stroke: #e2e8f0; stroke-width: 3; stroke-linecap: round; }
    </style>

    <marker id="sketch-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 1 1 L 9 5 L 1 9" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#fdfdfd" />

  <g transform="translate(100, 50)">
