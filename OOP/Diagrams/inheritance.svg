    <path d="M 110 165 C 108 140, 112 120, 110 105" fill="none" stroke="#475569" stroke-width="3" marker-end="url(#sketch-arrow)" />

    <text x="110" y="270" text-anchor="middle" class="label-text">Single Inheritance</text>
  </g>

  <g transform="translate(450, 50)">
