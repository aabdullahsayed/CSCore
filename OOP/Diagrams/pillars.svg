<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 650" width="100%" height="100%">
  <defs>
    <filter id="sketchy-shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="3" dy="4" stdDeviation="2" flood-color="#a0a0a0" flood-opacity="0.3"/>
    </filter>
    
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M 0 0 L 10 3.5 L 0 7" fill="none" stroke="#1e1e1e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <style>
    /* Styling to mimic a hand-drawn whiteboard look */
    .bg { fill: #fdfdfd; }
    .text { font-family: 'Comic Sans MS', 'Chalkboard SE', 'Caveat', 'Comic Neue', cursive, sans-serif; fill: #1e1e1e; font-size: 16px; }
    .title { font-size: 20px; font-weight: bold; }
    .box-bg { fill: #ffffff; stroke: #1e1e1e; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; filter: url(#sketchy-shadow); }
    .line { stroke: #1e1e1e; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .dashed { stroke-dasharray: 6 6; }
    .arrow { fill: none; stroke: #1e1e1e; stroke-width: 2.5; marker-end: url(#arrowhead); }
    
    /* Pillar specific colors */
    .fill-encap { fill: #eef2ff; }
    .fill-abstr { fill: #fff0f0; }
    .fill-inher { fill: #f0fdf4; }
    .fill-poly { fill: #fdf4ff; }
  </style>

  <rect class="bg" width="100%" height="100%"/>

  <g transform="translate(40, 40) rotate(-1)">
    <rect class="box-bg fill-encap" width="350" height="250" rx="15"/>
    <text class="text title" x="20" y="35">1. Encapsulation</text>
    <text class="text" x="20" y="55" font-size="14" fill="#666">"Bundling data &amp; protecting it"</text>
    
    <rect class="box-bg" x="70" y="80" width="210" height="130" rx="65"/>
    <path class="line dashed" d="M 70 145 L 280 145"/>
    
    <text class="text" x="150" y="125" font-weight="bold">Data</text>
    <text class="text" x="135" y="185" font-weight="bold">Methods</text>
    
    <path class="line" d="M 160 80 Q 175 50 190 80" fill="none"/>
    <rect class="line" x="165" y="80" width="20" height="15" fill="#fcd34d"/>
  </g>

  <g transform="translate(450, 50) rotate(1)">
    <rect class="box-bg fill-abstr" width="350" height="250" rx="15"/>
    <text class="text title" x="20" y="35">2. Abstraction</text>
    <text class="text" x="20" y="55" font-size="14" fill="#666">"Hiding complexity, showing simple UI"</text>
    
    <path class="line" d="M 230 110 Q 250 80 270 120 T 310 90 T 260 170 T 300 200" fill="none" stroke-width="3"/>
    <circle class="line" cx="280" cy="140" r="15" fill="none" stroke-dasharray="4 4"/>
    <circle class="line" cx="250" cy="160" r="10" fill="none" stroke-dasharray="3 3"/>
    <text class="text" x="225" y="225" font-size="12" fill="#ef4444">Complex Logic (Hidden)</text>

    <path class="line dashed" d="M 210 80 L 210 210" stroke-width="3"/>

    <rect class="box-bg" x="50" y="120" width="100" height="50" rx="10"/>
    <text class="text" x="70" y="150" font-weight="bold">PRESS</text>
    <path class="arrow" d="M 150 145 L 200 145"/>
    <text class="text" x="45" y="225" font-size="12" fill="#3b82f6">Simple UI (Visible)</text>
  </g>

  <g transform="translate(40, 340) rotate(1)">
    <rect class="box-bg fill-inher" width="350" height="260" rx="15"/>
    <text class="text title" x="20" y="35">3. Inheritance</text>
    <text class="text" x="20" y="55" font-size="14" fill="#666">"Sharing traits from Parent to Child"</text>
    
    <rect class="box-bg" x="110" y="80" width="130" height="40" rx="5"/>
    <text class="text" x="140" y="105" font-weight="bold">Vehicle</text>
    
    <path class="arrow" d="M 175 120 L 175 150 L 80 150 L 80 170"/>
    <path class="arrow" d="M 175 120 L 175 150 L 270 150 L 270 170"/>
    
    <rect class="box-bg" x="30" y="175" width="100" height="50" rx="5"/>
    <text class="text" x="60" y="205">Car</text>
    
    <rect class="box-bg" x="220" y="175" width="100" height="50" rx="5"/>
    <text class="text" x="250" y="205">Bike</text>
    
    <text class="text" x="120" y="70" font-size="12" fill="#10b981">+ wheels, + drive()</text>
  </g>

  <g transform="translate(450, 330) rotate(-1)">
    <rect class="box-bg fill-poly" width="350" height="270" rx="15"/>
    <text class="text title" x="20" y="35">4. Polymorphism</text>
    <text class="text" x="20" y="55" font-size="14" fill="#666">"One instruction, different actions"</text>
    
    <rect class="box-bg" x="90" y="80" width="170" height="40" rx="20"/>
    <text class="text" x="130" y="105" font-weight="bold">speak()</text>
    
    <path class="arrow" d="M 120 120 L 80 160"/>
    <path class="arrow" d="M 230 120 L 270 160"/>
    
    <text class="text" x="50" y="180" font-weight="bold">Dog</text>
    <path class="line" d="M 20 190 Q 50 170 80 190 Q 90 220 50 230 Q 10 220 20 190" fill="#ffffff"/>
    <text class="text" x="30" y="215" fill="#d946ef">"Woof!"</text>
    
    <text class="text" x="250" y="180" font-weight="bold">Cat</text>
    <path class="line" d="M 230 190 Q 260 170 290 190 Q 300 220 260 230 Q 220 220 230 190" fill="#ffffff"/>
    <text class="text" x="240" y="215" fill="#d946ef">"Meow!"</text>
  </g>

</svg>
