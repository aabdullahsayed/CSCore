<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Comic Sans MS', 'Chalkboard SE', 'Caveat', 'Segoe Print', cursive, sans-serif;">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 1 1 Q 5 5 9 5 Q 5 5 1 9" fill="none" stroke="#1e293b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </marker>
        <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
            <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#cbd5e1" flood-opacity="0.5"/>
        </filter>
    </defs>

    <g text-anchor="middle" fill="#1e293b">
        <text x="600" y="60" font-size="34" font-weight="bold">DI Service Lifetimes</text>
        <path d="M 450 75 Q 600 80 750 72" fill="none" stroke="#1e293b" stroke-width="3" stroke-linecap="round" />
        <text x="600" y="105" font-size="18" fill="#64748b">How objects are created and shared across requests</text>

        <g transform="translate(40, 150)">
            <rect x="0" y="0" width="340" height="540" rx="20" fill="#f0f9ff" stroke="#1e293b" stroke-width="2.5" filter="url(#shadow)"/>
            <text x="170" y="45" font-size="26" font-weight="bold" fill="#0284c7">Transient</text>
            <text x="170" y="70" font-size="16" fill="#475569">"A fresh copy every time"</text>

            <rect x="20" y="100" width="300" height="340" rx="12" fill="#ffffff" stroke="#94a3b8" stroke-width="2" stroke-dasharray="10 8" />
            <text x="170" y="130" font-size="16" font-weight="bold" fill="#64748b">HTTP Request</text>

            <rect x="40" y="170" width="100" height="45" rx="8" fill="#f8fafc" stroke="#1e293b" stroke-width="2" />
            <text x="90" y="198" font-size="16">Service A</text>

            <circle cx="250" cy="192" r="35" fill="#bae6fd" stroke="#0ea5e9" stroke-width="2.5" />
            <text x="250" y="188" font-size="14" font-weight="bold">Inst</text>
            <text x="250" y="208" font-size="16" font-weight="bold">#1</text>

            <rect x="40" y="320" width="100" height="45" rx="8" fill="#f8fafc" stroke="#1e293b" stroke-width="2" />
            <text x="90" y="348" font-size="16">Service B</text>

            <circle cx="250" cy="342" r="35" fill="#bae6fd" stroke="#0ea5e9" stroke-width="2.5" />
            <text x="250" y="338" font-size="14" font-weight="bold">Inst</text>
            <text x="250" y="358" font-size="16" font-weight="bold">#2</text>

            <path d="M 145 192 Q 175 185 205 192" fill="none" stroke="#1e293b" stroke-width="2" marker-end="url(#arrow)" />
            <text x="180" y="180" font-size="13" fill="#64748b" transform="rotate(-5 180 180)">creates</text>

            <path d="M 145 342 Q 175 350 205 342" fill="none" stroke="#1e293b" stroke-width="2" marker-end="url(#arrow)" />
            <text x="180" y="330" font-size="13" fill="#64748b" transform="rotate(5 180 330)">creates</text>

            <rect x="20" y="465" width="300" height="50" rx="8" fill="#1e293b" />
            <text x="170" y="495" font-size="18" fill="#38bdf8" font-family="monospace">.AddTransient()</text>
        </g>


        <g transform="translate(420, 150)">
            <rect x="0" y="0" width="340" height="540" rx="20" fill="#f0fdf4" stroke="#1e293b" stroke-width="2.5" filter="url(#shadow)"/>
            <text x="170" y="45" font-size="26" font-weight="bold" fill="#16a34a">Scoped</text>
            <text x="170" y="70" font-size="16" fill="#475569">"Shared within one request"</text>

            <rect x="20" y="100" width="300" height="340" rx="12" fill="#ffffff" stroke="#94a3b8" stroke-width="2" stroke-dasharray="10 8" />
            <text x="170" y="130" font-size="16" font-weight="bold" fill="#64748b">HTTP Request</text>

            <rect x="40" y="170" width="100" height="45" rx="8" fill="#f8fafc" stroke="#1e293b" stroke-width="2" />
            <text x="90" y="198" font-size="16">Service A</text>

            <rect x="40" y="320" width="100" height="45" rx="8" fill="#f8fafc" stroke="#1e293b" stroke-width="2" />
            <text x="90" y="348" font-size="16">Service B</text>

            <circle cx="250" cy="265" r="45" fill="#bbf7d0" stroke="#22c55e" stroke-width="2.5" />
            <text x="250" y="260" font-size="14" font-weight="bold">Shared</text>
            <text x="250" y="280" font-size="16" font-weight="bold">Instance</text>

            <path d="M 145 192 Q 220 192 235 215" fill="none" stroke="#1e293b" stroke-width="2" marker-end="url(#arrow)" />
            <text x="195" y="185" font-size="13" fill="#64748b">creates</text>

            <path d="M 145 342 Q 220 342 235 315" fill="none" stroke="#1e293b" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow)" />
            <text x="195" y="360" font-size="13" fill="#64748b">reuses</text>

            <rect x="20" y="465" width="300" height="50" rx="8" fill="#1e293b" />
            <text x="170" y="495" font-size="18" fill="#4ade80" font-family="monospace">.AddScoped()</text>
        </g>


        <g transform="translate(800, 150)">
            <rect x="0" y="0" width="340" height="540" rx="20" fill="#faf5ff" stroke="#1e293b" stroke-width="2.5" filter="url(#shadow)"/>
            <text x="170" y="45" font-size="26" font-weight="bold" fill="#9333ea">Singleton</text>
            <text x="170" y="70" font-size="16" fill="#475569">"One instance for everyone"</text>

            <rect x="20" y="100" width="300" height="340" rx="12" fill="#ffffff" stroke="#94a3b8" stroke-width="2" stroke-dasharray="10 8" />
            <text x="170" y="130" font-size="16" font-weight="bold" fill="#64748b">Application Lifetime</text>

            <rect x="35" y="155" width="125" height="75" rx="8" fill="#fdf4ff" stroke="#e9d5ff" stroke-width="2"/>
            <text x="97" y="175" font-size="12" fill="#94a3b8">Request 1</text>
            <rect x="45" y="180" width="100" height="40" rx="8" fill="#f8fafc" stroke="#1e293b" stroke-width="2" />
            <text x="95" y="206" font-size="15">Service A</text>

            <rect x="35" y="305" width="125" height="75" rx="8" fill="#fdf4ff" stroke="#e9d5ff" stroke-width="2"/>
            <text x="97" y="325" font-size="12" fill="#94a3b8">Request 2</text>
            <rect x="45" y="330" width="100" height="40" rx="8" fill="#f8fafc" stroke="#1e293b" stroke-width="2" />
            <text x="95" y="356" font-size="15">Service B</text>

            <circle cx="255" cy="265" r="50" fill="#e9d5ff" stroke="#a855f7" stroke-width="2.5" />
            <text x="255" y="260" font-size="14" font-weight="bold">Global</text>
            <text x="255" y="280" font-size="16" font-weight="bold">Instance</text>

            <path d="M 148 200 Q 220 200 232 215" fill="none" stroke="#1e293b" stroke-width="2" marker-end="url(#arrow)" />
            <text x="195" y="190" font-size="13" fill="#64748b">creates</text>

            <path d="M 148 350 Q 230 350 240 318" fill="none" stroke="#1e293b" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow)" />
            <text x="205" y="375" font-size="13" fill="#64748b">reuses</text>

            <rect x="20" y="465" width="300" height="50" rx="8" fill="#1e293b" />
            <text x="170" y="495" font-size="18" fill="#c084fc" font-family="monospace">.AddSingleton()</text>
        </g>
    </g>
</svg>
