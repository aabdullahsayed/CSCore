<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" font-family="system-ui, -apple-system, sans-serif">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
        </marker>
        
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.1"/>
        </filter>

        <linearGradient id="transientGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3b82f6" />
            <stop offset="100%" stop-color="#2563eb" />
        </linearGradient>
        <linearGradient id="scopedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#10b981" />
            <stop offset="100%" stop-color="#059669" />
        </linearGradient>
        <linearGradient id="singletonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#8b5cf6" />
            <stop offset="100%" stop-color="#6d28d9" />
        </linearGradient>
    </defs>

    <rect width="100%" height="100%" fill="#f8fafc" />

    <text x="600" y="60" font-size="32" font-weight="bold" text-anchor="middle" fill="#0f172a">.NET Dependency Injection Service Lifetimes</text>
    <text x="600" y="90" font-size="16" text-anchor="middle" fill="#64748b">How instances are created and shared across HTTP Requests</text>

    <g transform="translate(50, 140)">
        <rect width="340" height="460" rx="16" fill="#ffffff" filter="url(#shadow)" stroke="#e2e8f0" stroke-width="2"/>
        <text x="170" y="40" font-size="22" font-weight="bold" text-anchor="middle" fill="#1e293b">Transient</text>
        <text x="170" y="65" font-size="14" text-anchor="middle" fill="#64748b">"Fresh every time"</text>
        
        <rect x="20" y="90" width="300" height="260" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="5,5"/>
        <text x="170" y="115" font-size="14" font-weight="bold" text-anchor="middle" fill="#475569">Single HTTP Request</text>

        <rect x="40" y="140" width="100" height="40" rx="6" fill="#e2e8f0" />
        <text x="90" y="165" font-size="14" font-weight="bold" text-anchor="middle" fill="#334155">Component A</text>
        
        <rect x="40" y="240" width="100" height="40" rx="6" fill="#e2e8f0" />
        <text x="90" y="265" font-size="14" font-weight="bold" text-anchor="middle" fill="#334155">Component B</text>

        <line x1="145" y1="160" x2="190" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
        <line x1="145" y1="260" x2="190" y2="260" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

        <circle cx="240" cy="160" r="30" fill="url(#transientGrad)" />
        <text x="240" y="155" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">Instance</text>
        <text x="240" y="170" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffffff">#1</text>

        <circle cx="240" cy="260" r="30" fill="url(#transientGrad)" />
        <text x="240" y="255" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">Instance</text>
        <text x="240" y="270" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffffff">#2</text>

        <rect x="20" y="380" width="300" height="60" rx="8" fill="#1e293b" />
        <text x="170" y="405" font-size="13" font-family="monospace" text-anchor="middle" fill="#e2e8f0">builder.Services</text>
        <text x="170" y="425" font-size="13" font-family="monospace" text-anchor="middle" fill="#93c5fd">.AddTransient&lt;IService&gt;()</text>
    </g>

    <g transform="translate(430, 140)">
        <rect width="340" height="460" rx="16" fill="#ffffff" filter="url(#shadow)" stroke="#e2e8f0" stroke-width="2"/>
        <text x="170" y="40" font-size="22" font-weight="bold" text-anchor="middle" fill="#1e293b">Scoped</text>
        <text x="170" y="65" font-size="14" text-anchor="middle" fill="#64748b">"Once per request"</text>
        
        <rect x="20" y="90" width="300" height="260" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="5,5"/>
        <text x="170" y="115" font-size="14" font-weight="bold" text-anchor="middle" fill="#475569">Single HTTP Request</text>

        <rect x="40" y="140" width="100" height="40" rx="6" fill="#e2e8f0" />
        <text x="90" y="165" font-size="14" font-weight="bold" text-anchor="middle" fill="#334155">Component A</text>
        
        <rect x="40" y="240" width="100" height="40" rx="6" fill="#e2e8f0" />
        <text x="90" y="265" font-size="14" font-weight="bold" text-anchor="middle" fill="#334155">Component B</text>

        <path d="M 145 160 C 180 160, 180 200, 195 200" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
        <path d="M 145 260 C 180 260, 180 220, 195 220" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

        <circle cx="240" cy="210" r="35" fill="url(#scopedGrad)" />
        <text x="240" y="205" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff">Shared</text>
        <text x="240" y="222" font-size="15" font-weight="bold" text-anchor="middle" fill="#ffffff">Instance</text>

        <rect x="20" y="380" width="300" height="60" rx="8" fill="#1e293b" />
        <text x="170" y="405" font-size="13" font-family="monospace" text-anchor="middle" fill="#e2e8f0">builder.Services</text>
        <text x="170" y="425" font-size="13" font-family="monospace" text-anchor="middle" fill="#6ee7b7">.AddScoped&lt;IService&gt;()</text>
    </g>

    <g transform="translate(810, 140)">
        <rect width="340" height="460" rx="16" fill="#ffffff" filter="url(#shadow)" stroke="#e2e8f0" stroke-width="2"/>
        <text x="170" y="40" font-size="22" font-weight="bold" text-anchor="middle" fill="#1e293b">Singleton</text>
        <text x="170" y="65" font-size="14" text-anchor="middle" fill="#64748b">"One for everyone"</text>
        
        <rect x="20" y="90" width="130" height="120" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="5,5"/>
        <text x="85" y="110" font-size="12" font-weight="bold" text-anchor="middle" fill="#475569">HTTP Request 1</text>
        <rect x="35" y="140" width="100" height="30" rx="6" fill="#e2e8f0" />
        <text x="85" y="160" font-size="12" font-weight="bold" text-anchor="middle" fill="#334155">Component A</text>

        <rect x="20" y="230" width="130" height="120" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="5,5"/>
        <text x="85" y="250" font-size="12" font-weight="bold" text-anchor="middle" fill="#475569">HTTP Request 2</text>
        <rect x="35" y="280" width="100" height="30" rx="6" fill="#e2e8f0" />
        <text x="85" y="300" font-size="12" font-weight="bold" text-anchor="middle" fill="#334155">Component B</text>

        <path d="M 140 155 C 180 155, 180 190, 190 200" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
        <path d="M 140 295 C 180 295, 180 230, 190 220" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

        <rect x="180" y="140" width="140" height="140" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2" />
        <text x="250" y="160" font-size="11" font-weight="bold" text-anchor="middle" fill="#94a3b8">Application Scope</text>

        <circle cx="250" cy="210" r="35" fill="url(#singletonGrad)" />
        <text x="250" y="205" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff">Global</text>
        <text x="250" y="222" font-size="15" font-weight="bold" text-anchor="middle" fill="#ffffff">Instance</text>

        <rect x="20" y="380" width="300" height="60" rx="8" fill="#1e293b" />
        <text x="170" y="405" font-size="13" font-family="monospace" text-anchor="middle" fill="#e2e8f0">builder.Services</text>
        <text x="170" y="425" font-size="13" font-family="monospace" text-anchor="middle" fill="#c4b5fd">.AddSingleton&lt;IService&gt;()</text>
    </g>
</svg>
