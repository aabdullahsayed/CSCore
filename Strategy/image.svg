<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Arial, sans-serif; background-color: #111827;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#94a3b8"/>
    </marker>

    <marker id="hollow-arrow" viewBox="0 0 14 14" refX="14" refY="7" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 14 7 L 0 14 Z" fill="#111827" stroke="#94a3b8" stroke-width="2"/>
    </marker>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <text x="500" y="60" text-anchor="middle" font-size="28" font-weight="600" fill="#f8fafc" letter-spacing="1">Strategy Pattern Architecture</text>

  <g transform="translate(50, 130)" filter="url(#shadow)">
    <rect width="320" height="160" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <path d="M 0 6 a 6 6 0 0 1 6 -6 h 308 a 6 6 0 0 1 6 6 v 34 h -320 z" fill="#2563eb"/>
    
    <text x="160" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff" letter-spacing="0.5">CONTEXT</text>
    <text x="160" y="65" text-anchor="middle" font-size="18" font-weight="600" fill="#f8fafc">PaymentProcess.cs</text>
    <line x1="20" y1="80" x2="300" y2="80" stroke="#334155" stroke-width="1"/>
    
    <text x="20" y="105" font-size="14" font-family="'Cascadia Code', Consolas, monospace" fill="#cbd5e1">- _strategy: IPaymentStrategy</text>
    <text x="20" y="130" font-size="14" font-family="'Cascadia Code', Consolas, monospace" fill="#86efac">+ SetStrategy(strategy)</text>
    <text x="20" y="150" font-size="14" font-family="'Cascadia Code', Consolas, monospace" fill="#86efac">+ ExecutePayment(amount)</text>
  </g>

  <g transform="translate(630, 130)" filter="url(#shadow)">
    <rect width="320" height="160" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <path d="M 0 6 a 6 6 0 0 1 6 -6 h 308 a 6 6 0 0 1 6 6 v 34 h -320 z" fill="#7c3aed"/>
    
    <text x="160" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff" letter-spacing="0.5">«interface» STRATEGY</text>
    <text x="160" y="75" text-anchor="middle" font-size="18" font-weight="600" fill="#f8fafc">IPaymentStrategy.cs</text>
    <line x1="20" y1="95" x2="300" y2="95" stroke="#334155" stroke-width="1"/>
    
    <text x="160" y="130" text-anchor="middle" font-size="15" font-family="'Cascadia Code', Consolas, monospace" fill="#86efac">+ pay(amount: decimal)</text>
  </g>

  <path d="M 370 210 L 615 210" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="492" y="195" text-anchor="middle" font-size="14" fill="#cbd5e1" font-weight="500">Uses (Has-A)</text>
  <text x="492" y="230" text-anchor="middle" font-size="12" fill="#94a3b8" font-style="italic">Delegates execution</text>

  <g transform="translate(100, 420)" filter="url(#shadow)">
    <rect width="240" height="120" rx="6" fill="#1e293b" stroke="#e11d48" stroke-width="2"/>
    <path d="M 0 6 a 6 6 0 0 1 6 -6 h 228 a 6 6 0 0 1 6 6 v 29 h -240 z" fill="#be185d"/>
    <text x="120" y="23" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">BkashPayment.cs</text>
    <text x="120" y="70" text-anchor="middle" font-size="14" font-family="'Cascadia Code', Consolas, monospace" fill="#86efac">+ pay(amount)</text>
    <text x="120" y="95" text-anchor="middle" font-size="13" fill="#94a3b8" font-style="italic">// Bkash API Logic</text>
  </g>

  <g transform="translate(380, 420)" filter="url(#shadow)">
    <rect width="240" height="120" rx="6" fill="#1e293b" stroke="#0d9488" stroke-width="2"/>
    <path d="M 0 6 a 6 6 0 0 1 6 -6 h 228 a 6 6 0 0 1 6 6 v 29 h -240 z" fill="#0f766e"/>
    <text x="120" y="23" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">CardPayment.cs</text>
    <text x="120" y="70" text-anchor="middle" font-size="14" font-family="'Cascadia Code', Consolas, monospace" fill="#86efac">+ pay(amount)</text>
    <text x="120" y="95" text-anchor="middle" font-size="13" fill="#94a3b8" font-style="italic">// Credit Card Gateway</text>
  </g>

  <g transform="translate(660, 420)" filter="url(#shadow)">
    <rect width="240" height="120" rx="6" fill="#1e293b" stroke="#ea580c" stroke-width="2"/>
    <path d="M 0 6 a 6 6 0 0 1 6 -6 h 228 a 6 6 0 0 1 6 6 v 29 h -240 z" fill="#c2410c"/>
    <text x="120" y="23" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">NagadPayment.cs</text>
    <text x="120" y="70" text-anchor="middle" font-size="14" font-family="'Cascadia Code', Consolas, monospace" fill="#86efac">+ pay(amount)</text>
    <text x="120" y="95" text-anchor="middle" font-size="13" fill="#94a3b8" font-style="italic">// Nagad API Logic</text>
  </g>

  <path d="M 500 420 L 500 360 L 790 360 L 790 304" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#hollow-arrow)"/>
  <path d="M 220 420 L 220 360 L 790 360" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,4"/>
  <path d="M 780 420 L 780 360" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,4"/>

  <g transform="translate(50, 30)" filter="url(#shadow)">
    <rect width="220" height="60" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
    <path d="M 0 6 a 6 6 0 0 1 6 -6 h 208 a 6 6 0 0 1 6 6 v 18 h -220 z" fill="#334155"/>
    <text x="110" y="17" text-anchor="middle" font-size="12" font-weight="bold" fill="#f8fafc">Program.cs (Client)</text>
    <text x="110" y="45" text-anchor="middle" font-size="11" fill="#cbd5e1">Injects strategy at runtime</text>
    <path d="M 110 60 L 110 115" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrow)"/>
  </g>

</svg>
